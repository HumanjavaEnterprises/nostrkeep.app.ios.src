name: NostrKey
options:
  bundleIdPrefix: com.nostrkey
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  NostrKey:
    type: application
    platform: iOS
    sources:
      - path: NostrKey-v2/App
      - path: NostrKey-v2/Scanner
      - path: NostrKey-v2/Identity
      - path: NostrKey-v2/Relay
      - path: NostrKey-v2/NIP46
      - path: NostrKey-v2/Crypto
      - path: NostrKey-v2/UI
      - path: NostrKey/Assets.xcassets
      - path: NostrKey-v2/Info.plist
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nostrkey.authenticator
        PRODUCT_NAME: NostrKey
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: "NostrKey-v2/Info.plist"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: NostrKey-v2/NostrKey.entitlements
        ALWAYS_SEARCH_USER_PATHS: NO
